<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECKITT ENGINE - VIP COMMAND CENTER</title>
    <!-- VIP Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* --- GLOBAL GLASSMORPHISM POPINK THEME --- */
        :root {
            --bg-dark: #07030a;
            --neon-pink: #ff007f;
            --neon-purple: #9d00ff;
            --glass-bg: rgba(20, 11, 28, 0.55);
            --glass-border: rgba(255, 0, 127, 0.4);
            --glass-blur: blur(20px);
            --text-main: #f0f0f0;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; color: var(--text-main); overflow-x: hidden;
            background: radial-gradient(circle at 15% 50%, rgba(157, 0, 255, 0.15), transparent 30%),
                        radial-gradient(circle at 85% 30%, rgba(255, 0, 127, 0.15), transparent 30%),
                        var(--bg-dark);
            background-attachment: fixed;
        }
        
        .hidden { display: none !important; }
        
        /* GLASS PANELS */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.6);
        }

        /* RECKITT LOGO TEXT */
        .reckitt-logo {
            font-family: 'Arial Black', Impact, sans-serif;
            font-size: 46px;
            font-style: italic;
            color: #E20074; 
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(226, 0, 116, 0.8), 0 0 40px rgba(226, 0, 116, 0.4);
        }
        
        /* LOGIN SCREEN */
        #login-screen { display: flex; height: 100vh; justify-content: center; align-items: center; position: relative; z-index: 10; }
        .login-box { padding: 50px 40px; border-radius: 15px; text-align: center; width: 420px; position: relative; overflow: hidden; }
        .login-box h4 { color: #fff; margin-top: 0; margin-bottom: 30px; letter-spacing: 5px; font-weight: 400; text-shadow: 0 0 10px var(--neon-purple); }
        
        .vip-input { width: 85%; padding: 16px; margin: 12px 0; background: rgba(0,0,0,0.6); border: 1px solid var(--neon-purple); color: #fff; border-radius: 8px; font-size: 16px; text-align: center; outline: none; transition: 0.3s; letter-spacing: 1px; }
        .vip-input:focus { border-color: var(--neon-pink); box-shadow: 0 0 20px rgba(255, 0, 127, 0.6); background: rgba(0,0,0,0.9); }
        .vip-btn { width: 100%; padding: 18px; margin-top: 25px; background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple)); border: none; color: #fff; font-weight: 900; font-size: 18px; border-radius: 8px; cursor: pointer; transition: 0.3s; letter-spacing: 3px; box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }
        .vip-btn:hover { box-shadow: 0 0 40px var(--neon-pink); transform: translateY(-3px); }

        /* VIP WELCOME ANIMATION SCREEN */
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 1; transition: opacity 1s ease-out; }
        .glowing-name { font-size: 4rem; color: #fff; text-transform: uppercase; font-weight: 900; text-shadow: 0 0 20px var(--neon-pink), 0 0 40px var(--neon-purple), 0 0 80px var(--neon-pink); animation: pulseGlow 1.5s infinite alternate; text-align: center; margin: 0; }
        .welcome-sub { color: var(--neon-pink); font-size: 1.5rem; letter-spacing: 10px; margin-top: 20px; animation: slideUp 1s ease-out; }

        @keyframes pulseGlow { 0% { transform: scale(0.95); text-shadow: 0 0 10px var(--neon-pink); } 100% { transform: scale(1.05); text-shadow: 0 0 30px var(--neon-pink), 0 0 60px var(--neon-purple); } }
        @keyframes slideUp { 0% { opacity: 0; transform: translateY(50px); } 100% { opacity: 1; transform: translateY(0); } }

        /* APP SCREEN */
        #app-screen { padding: 30px; max-width: 1600px; margin: 0 auto; position: relative; z-index: 10; }
        .header-panel { display: flex; justify-content: space-between; align-items: center; padding: 25px 40px; border-radius: 12px; margin-bottom: 25px; }
        .upload-section { text-align: center; padding: 40px; border-radius: 12px; margin-bottom: 30px; }
        .upload-btn-secure { background: rgba(255,0,127,0.1); border: 2px solid var(--neon-pink); color: #fff; padding: 15px 40px; font-size: 18px; font-weight: 900; border-radius: 8px; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .upload-btn-secure:hover { background: var(--neon-pink); box-shadow: 0 0 30px var(--neon-pink); }
        input[type="file"] { display: none; }
        
        .day-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; margin-top: 20px; }
        .day-card { border-radius: 12px; padding: 30px; text-align: center; transition: 0.3s; position: relative; overflow: hidden; }
        .day-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px; background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple)); }
        .day-card:hover { border-color: var(--neon-pink); box-shadow: 0 0 30px rgba(255,0,127,0.3); transform: translateY(-5px); }
        .day-card h3 { color: #fff; text-shadow: 0 0 15px var(--neon-pink); font-size: 26px; margin-top: 0; margin-bottom: 25px; letter-spacing: 2px; }
        .action-btn { padding: 16px 10px; font-size: 16px; font-weight: 900; cursor: pointer; border: none; border-radius: 8px; transition: 0.2s; background: linear-gradient(90deg, var(--neon-pink), var(--neon-purple)); color: #fff; width: 100%; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .action-btn:hover { box-shadow: 0 0 20px var(--neon-pink); }

        /* THE MASTER PRINT DASHBOARD */
        #print-dashboard { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 2, 8, 0.9); backdrop-filter: blur(25px); z-index: 9999; display: flex; flex-direction: column; }
        .dashboard-header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--neon-pink); background: rgba(0,0,0,0.5); }
        .dashboard-body { display: flex; flex: 1; overflow: hidden; }
        
        .settings-panel { width: 400px; padding: 30px; overflow-y: auto; border-right: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); }
        .setting-group { margin-bottom: 25px; }
        .setting-group label { display: block; font-weight: bold; margin-bottom: 10px; color: var(--neon-pink); letter-spacing: 1px; }
        .setting-group input[type="range"] { width: 100%; accent-color: var(--neon-purple); cursor: pointer; }
        .setting-group select { width: 100%; padding: 12px; background: rgba(0,0,0,0.7); color: #fff; border: 1px solid var(--neon-purple); border-radius: 6px; font-weight: bold; outline: none; cursor: pointer; }
        .col-checkbox { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-size: 15px; cursor: pointer; }
        
        .preview-panel { flex: 1; background: transparent; padding: 40px; overflow: auto; display: flex; justify-content: center; align-items: flex-start; }
        #live-preview-paper { background: #fff; color: #000; box-shadow: 0 0 50px rgba(0,0,0,1); padding: 5mm; min-width: 297mm; min-height: 210mm; transform-origin: top center; }
        
        #hardwarePrintFrame { display: none; }
    </style>
</head>
<body>

    <!-- VIP WELCOME SCREEN -->
    <div id="welcome-screen" class="hidden">
        <h1 class="glowing-name">VIP WELCOME DILAWAR ALI</h1>
        <div class="welcome-sub">INITIALIZING RECKITT ENGINE...</div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-box glass-panel">
            <div class="reckitt-logo">RECKITT</div>
            <h4>DAY PLANNER ENGINE</h4>
            <input type="text" id="username" class="vip-input" placeholder="USERNAME" autocomplete="off">
            <input type="password" id="password" class="vip-input" placeholder="PASSWORD" autocomplete="off">
            <button class="vip-btn" onclick="attemptLogin()">INITIATE LINK</button>
        </div>

    <!-- MAIN APP SCREEN -->
    <div id="app-screen" class="hidden">
        <div class="header-panel glass-panel">
            <div class="reckitt-logo" style="font-size: 32px; margin: 0; text-shadow: 0 0 15px var(--neon-pink);">RECKITT COMMAND CENTER</div>
            <div>
                <span style="font-weight: 900; font-size: 16px; margin-right: 20px; color: #aaa;">NETWORK: <span style="color: #00ff00; text-shadow: 0 0 15px #00ff00;">SECURE & LIVE</span></span>
                <button onclick="logout('Console Locked.')" style="padding: 12px 30px; background: rgba(255, 68, 68, 0.1); color: #ff4444; border: 1px solid #ff4444; border-radius: 8px; cursor: pointer; font-weight: 900; transition: 0.3s; letter-spacing: 1px;" onmouseover="this.style.background='#ff4444'; this.style.color='#fff';" onmouseout="this.style.background='rgba(255, 68, 68, 0.1)'; this.style.color='#ff4444';">LOCK CONSOLE</button>
            </div>
        </div>

        <div class="upload-section glass-panel">
            <h2 style="color: #fff; margin-top: 0; font-size: 32px; text-shadow: 0 0 15px var(--neon-purple); letter-spacing: 2px;">GLOBAL DATABASE OVERWRITE</h2>
            <p style="color: #aaa; margin-bottom: 25px; font-size: 16px;">Secondary verification required to permanently replace Master Data.</p>
            <button class="upload-btn-secure" onclick="verifyAndUpload()">🔒 AUTHORIZE & UPLOAD NEW PLANNER</button>
            <input type="file" id="excel-file" accept=".xlsx, .xls">
        </div>
        <div id="day-nav" class="day-grid"></div>
    </div>

    <!-- MASTER PRINT DASHBOARD -->
    <div id="print-dashboard" class="hidden">
        <div class="dashboard-header glass-panel" style="border-radius: 0; border: none; border-bottom: 2px solid var(--neon-pink);">
            <h2 style="margin: 0; color: #fff; text-shadow: 0 0 15px var(--neon-pink); letter-spacing: 1px;">🎛️ AI PRINT STABILIZER (GLASS MODE)</h2>
            <div>
                <button onclick="closePrintDashboard()" style="padding: 12px 25px; background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; margin-right: 15px; cursor: pointer; font-weight: bold;">CANCEL</button>
                <button onclick="triggerHardwarePrint()" style="padding: 12px 35px; background: var(--neon-pink); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 900; font-size: 16px; box-shadow: 0 0 20px var(--neon-pink); letter-spacing: 1px;">🖨️ EXECUTE PRINT</button>
            </div>
        </div>
        <div class="dashboard-body">
            <div class="settings-panel glass-panel" style="border-radius: 0; border: none; border-right: 1px solid rgba(255,255,255,0.1);">
                
                <div class="setting-group" style="background: rgba(157,0,255,0.2); padding: 18px; border-radius: 8px; border: 1px solid var(--neon-purple); box-shadow: inset 0 0 15px rgba(157,0,255,0.2);">
                    <label style="color: #fff; font-size: 16px;">🎯 TARGET ROUTE</label>
                    <select id="route-filter" onchange="updatePreview()">
                        <option value="ALL">PRINT ALL ROUTES FOR DAY</option>
                    </select>
                </div>

                <div class="setting-group">
                    <label>Grid Auto-Fit Mode</label>
                    <select id="set-layout" onchange="updatePreview()">
                        <option value="fixed" selected>AI Strict Confinement (Locked Width)</option>
                        <option value="auto">Natural Flow (Dynamic Width)</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>Print Preview Scale (<span id="val-zoom">80</span>%)</label>
                    <input type="range" id="set-zoom" min="50" max="150" value="80" step="5" oninput="updatePreview()">
                </div>
                <div class="setting-group">
                    <label>Data Font Size (<span id="val-font">7.5</span>pt)</label>
                    <input type="range" id="set-font" min="4" max="14" value="7.5" step="0.5" oninput="updatePreview()">
                </div>
                <div class="setting-group">
                    <label>Cell Padding (<span id="val-pad">3</span>px)</label>
                    <input type="range" id="set-pad" min="1" max="10" value="3" oninput="updatePreview()">
                </div>
                <div class="setting-group" style="display: flex; gap: 12px; align-items: center; margin-bottom: 35px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px;">
                    <input type="checkbox" id="set-wrap" onchange="updatePreview()" style="width: 22px; height: 22px; accent-color: var(--neon-pink);">
                    <label style="margin: 0; color: #fff; font-size: 15px;">Prevent Text Wrapping</label>
                </div>
                
                <h3 style="color: var(--neon-pink); border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 30px; letter-spacing: 1px;">COLUMNS TO PRINT (AI Sorted)</h3>
                <div id="column-toggles"></div>
            </div>
            
            <div class="preview-panel">
                <div id="live-preview-paper"></div>
            </div>
        </div>
    </div>

    <!-- INVISIBLE HARDWARE PRINT ENGINE -->
    <iframe id="hardwarePrintFrame"></iframe>

<script>
    // ==========================================
    // 1. SUPABASE DATABASE
    // ==========================================
    const SUPABASE_URL = 'https://idctzgsrcthumrtyaucc.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkY3R6Z3NyY3RodW1ydHlhdWNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwODI5MjgsImV4cCI6MjA5NTY1ODkyOH0.QU2YHQx4QdbhEGex1AN4S_URt6OqrHXN4rnL7N3wbKI'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let masterData = [];
    let allColumns = [];
    let sortedColumns = [];
    let activeDay = "";

    const STRICT_COLUMN_ORDER = [
        "Route Name", "Customer Code", "Mini", "110g NCP OG", "110g NCP SC/Cool", 
        "80g NCP SC/OG/ Cool", "Harpic 225ml OG", "Harpic 450ml TC", "Veet Cream 18g/32g", 
        "Veet Lotion 40ml", "Mortein 300 ml", "LED Comp", "30N", "Coil"
    ];

    // ==========================================
    // 2. VIP SECURITY & CLOUD SYNC LOGIC
    // ==========================================
    window.onload = () => { if(localStorage.getItem('kpo_auth') === 'true') { attemptLogin(true); } }

    function attemptLogin(auto = false) {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;

        if(auto || (u === 'KPO' && p === '15075')) {
            localStorage.setItem('kpo_auth', 'true');
            document.getElementById('login-screen').classList.add('hidden');
            
            if(!auto) {
                const welcome = document.getElementById('welcome-screen');
                welcome.classList.remove('hidden');
                setTimeout(() => {
                    welcome.style.opacity = '0';
                    setTimeout(() => {
                        welcome.classList.add('hidden');
                        document.getElementById('app-screen').classList.remove('hidden');
                        fetchLiveDatabase();
                    }, 1000); 
                }, 4000); 
            } else {
                document.getElementById('app-screen').classList.remove('hidden');
                fetchLiveDatabase();
            }
        } else {
            Swal.fire({ title: 'ACCESS DENIED', text: 'Intrusion Detected.', icon: 'error', background: 'rgba(20, 11, 28, 0.95)', color: '#ff007f' });
        }
    }

    function logout(msg) {
        localStorage.removeItem('kpo_auth');
        location.reload();
    }

    // --- THE FIX: LOADING INDICATOR FOR DATABASE DOWNLOAD ---
    async function fetchLiveDatabase() {
        Swal.fire({
            title: 'ESTABLISHING SECURE LINK',
            text: 'Downloading Master Database from Cloud...',
            background: 'rgba(20, 11, 28, 0.95)',
            color: '#00ff00',
            allowOutsideClick: false,
            didOpen: () => Swal.showLoading()
        });

        try {
            const { data, error } = await _supabase.from('day_planner').select('planner_data').eq('id', 1).single();
            if (error) throw error;
            
            if(data && data.planner_data && data.planner_data.length > 0) {
                masterData = data.planner_data;
                allColumns = Object.keys(masterData[0]);
                sortAndPrepareColumns();
                buildNavigation();
                Swal.close();
            } else {
                Swal.fire({ title: 'DATABASE EMPTY', text: 'No Planner found. Please upload.', icon: 'info', background: 'rgba(20, 11, 28, 0.95)', color: '#ff007f' });
            }
        } catch (err) {
            Swal.fire({ title: 'SYNC FAILED', text: err.message, icon: 'error', background: 'rgba(20, 11, 28, 0.95)', color: '#ff007f' });
        }
    }

    // ==========================================
    // 3. SECURE UPLOAD VERIFICATION
    // ==========================================
    function verifyAndUpload() {
        Swal.fire({
            title: 'SECURITY CLEARANCE',
            text: 'Enter Master Verification Key',
            input: 'password',
            background: 'rgba(20, 11, 28, 0.95)',
            backdrop: 'rgba(0,0,0,0.8)',
            color: '#fff',
            confirmButtonColor: '#ff007f',
            cancelButtonColor: '#333',
            showCancelButton: true
        }).then((result) => {
            if(result.value === 'Aa135135%') {
                document.getElementById('excel-file').click();
            } else if(result.value) {
                Swal.fire({title: 'DENIED', text: 'Incorrect Security Key', icon: 'error', background: 'rgba(20, 11, 28, 0.9)', color: '#ff007f'});
            }
        });
    }

    document.getElementById('excel-file').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        Swal.fire({ title: 'Syncing to Reckitt Network...', background: 'rgba(20, 11, 28, 0.9)', color: '#ff007f', didOpen: () => Swal.showLoading() });

        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames.includes('Sheet6') ? 'Sheet6' : workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(sheet, {defval: ""});
            
            const { error } = await _supabase.from('day_planner').upsert({ id: 1, planner_data: jsonData });
            if(!error) {
                masterData = jsonData;
                allColumns = Object.keys(masterData[0]);
                sortAndPrepareColumns();
                buildNavigation();
                Swal.fire({ title: 'NETWORK UPDATED', icon: 'success', background: 'rgba(20, 11, 28, 0.9)', color: '#9d00ff', confirmButtonColor: '#9d00ff' });
            }
        };
        reader.readAsArrayBuffer(file);
    });

    function sortAndPrepareColumns() {
        sortedColumns = [...allColumns].sort((a, b) => {
            let posA = STRICT_COLUMN_ORDER.indexOf(a.trim());
            let posB = STRICT_COLUMN_ORDER.indexOf(b.trim());
            if (posA === -1) posA = 999;
            if (posB === -1) posB = 999;
            return posA - posB;
        });
    }

    function buildNavigation() {
        const days = [...new Set(masterData.map(item => item['Visit Day']))].filter(d => d).sort();
        const nav = document.getElementById('day-nav');
        nav.innerHTML = '';
        
        days.forEach(day => {
            const card = document.createElement('div');
            card.className = 'day-card glass-panel';
            card.innerHTML = `
                <h3>${day} PROTOCOL</h3>
                <button class="action-btn" onclick="openPrintDashboard('${day}')">⚙️ PREVIEW & PRINT</button>
                <button class="action-btn" style="background: transparent; border: 1px solid #00ff00; color: #00ff00;" onclick="exportExcel('${day}')">📊 EXPORT EXCEL</button>
            `;
            nav.appendChild(card);
        });
    }

    function exportExcel(day) {
        const dayData = masterData.filter(row => row['Visit Day'] === day);
        const ws = XLSX.utils.json_to_sheet(dayData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, `Plan_${day}`);
        XLSX.writeFile(wb, `Master_Report_${day}.xlsx`);
    }

    // ==========================================
    // 4. THE AI AUTO-FIT DASHBOARD ENGINE
    // ==========================================
    function openPrintDashboard(day) {
        activeDay = day;
        document.getElementById('print-dashboard').classList.remove('hidden');
        
        const routeSelect = document.getElementById('route-filter');
        routeSelect.innerHTML = '<option value="ALL">PRINT ALL ROUTES FOR DAY</option>';
        const dayData = masterData.filter(row => row['Visit Day'] === activeDay);
        const uniqueRoutes = [...new Set(dayData.map(row => row['Route Code']))].sort();
        uniqueRoutes.forEach(r => { if(r) routeSelect.innerHTML += `<option value="${r}">${r}</option>`; });

        const defaultHidden = ["Visit Day", "Cycle route description", "MTD", "Route Code"];
        const colContainer = document.getElementById('column-toggles');
        colContainer.innerHTML = '';
        
        sortedColumns.forEach(col => {
            const isChecked = !defaultHidden.includes(col.trim());
            const labelName = col.includes('__EMPTY') ? '[Data Column / No Header]' : col;
            colContainer.innerHTML += `
                <label class="col-checkbox">
                    <input type="checkbox" class="col-toggle" value="${col}" ${isChecked ? 'checked' : ''} onchange="updatePreview()"> 
                    <span style="color:#fff;">${labelName}</span>
                </label>
            `;
        });
        
        // Explicitly uncheck the wrap option to ensure default behavior is off per request
        document.getElementById('set-wrap').checked = false;
        
        updatePreview();
    }

    function closePrintDashboard() {
        document.getElementById('print-dashboard').classList.add('hidden');
    }

    function updatePreview() {
        const layoutMode = document.getElementById('set-layout').value;
        const zoomLevel = document.getElementById('set-zoom').value;
        const fSize = document.getElementById('set-font').value;
        const pad = document.getElementById('set-pad').value;
        const preventWrap = document.getElementById('set-wrap').checked;
        const selectedRouteFilter = document.getElementById('route-filter').value;
        
        document.getElementById('val-zoom').innerText = zoomLevel;
        document.getElementById('val-font').innerText = fSize;
        document.getElementById('val-pad').innerText = pad;

        const checkboxes = document.querySelectorAll('.col-toggle:checked');
        const selectedCols = Array.from(checkboxes).map(cb => cb.value);

        const dayData = masterData.filter(row => row['Visit Day'] === activeDay);
        let routes = [...new Set(dayData.map(row => row['Route Code']))].sort();
        if (selectedRouteFilter !== "ALL") routes = [selectedRouteFilter];
        
        let html = generateTableHTML(routes, dayData, selectedCols, fSize, pad, layoutMode, preventWrap);
        
        const paper = document.getElementById('live-preview-paper');
        paper.style.zoom = zoomLevel / 100;
        paper.innerHTML = html;
    }

    function generateTableHTML(routes, dayData, selectedCols, fSize, pad, layoutMode, preventWrap) {
        let html = '';
        const tableCSS = `width: 100%; max-width: 100%; border-collapse: collapse; margin-bottom: 25px; table-layout: ${layoutMode};`;
        
        // CRITICAL FIX: To prevent mid-word breaks while allowing full words to wrap to next line
        const wrapCSS = preventWrap ? 'white-space: nowrap;' : 'white-space: normal; word-break: normal; overflow-wrap: normal; hyphens: none;';
        
        const cellCSS = `
            border: 1.5pt solid #000; 
            padding: ${pad}px; 
            font-size: ${fSize}pt; 
            font-weight: bold; 
            text-align: center; 
            font-family: Arial, sans-serif;
            ${wrapCSS}
        `;

        // THE MASTER COLUMN WIDTH ALLOCATOR
        let colGroupHTML = '<colgroup>';
        selectedCols.forEach(col => {
            let colLower = col.toLowerCase();
            let width = '4%'; // Slim product columns
            
            if(colLower.includes('mini') || (colLower.includes('name') && !colLower.includes('route'))) {
                width = '18%'; // Extrawide for Store Names
            } else if(colLower.includes('customer') || colLower.includes('code')) {
                width = '8%'; // Snug fit for LHRXXXXX
            } else if(colLower.includes('route')) {
                width = '10%'; 
            }
            colGroupHTML += `<col style="width: ${width};">`;
        });
        colGroupHTML += '</colgroup>';

        routes.forEach(route => {
            const routeData = dayData.filter(row => row['Route Code'] === route);
            const routeName = routeData[0]['Route Name'] || '';
            const cycleDesc = routeData[0]['Cycle route description'] || '';
            
            html += `<div style="font-size: 16pt; font-weight: bold; font-family: Arial, sans-serif; margin-bottom: 5px; page-break-before: always; text-align: left;">ROUTE ${route} : ${routeName} : ${cycleDesc}</div>`;
            html += `<table style="${tableCSS}">`;
            
            if(layoutMode === 'fixed') html += colGroupHTML;
            
            html += `<thead><tr>`;
            selectedCols.forEach(col => {
                html += `<th style="${cellCSS} background-color: #E0E0E0 !important; text-transform: uppercase;">${col.includes('__EMPTY') ? '' : col}</th>`;
            });
            html += `</tr></thead><tbody>`;
            
            routeData.forEach(row => {
                html += `<tr>`;
                selectedCols.forEach(col => {
                    html += `<td style="${cellCSS}">${row[col] !== undefined ? row[col] : ""}</td>`;
                });
                html += `</tr>`;
            });
            html += `</tbody></table>`;
        });
        
        html = html.replace('page-break-before: always;', 'page-break-before: avoid;');
        return html;
    }

    // ==========================================
    // 5. SECURE HARDWARE INJECTION
    // ==========================================
    function triggerHardwarePrint() {
        const content = document.getElementById('live-preview-paper').innerHTML;
        const zoomLvl = document.getElementById('set-zoom').value / 100;
        
        let printHTML = `
        <!DOCTYPE html>
        <html>
        <head>
            <style>
                @page { size: A4 landscape; margin: 5mm; }
                body { 
                    margin: 0; padding: 0; background: #fff; color: #000; 
                    -webkit-print-color-adjust: exact; print-color-adjust: exact; 
                    zoom: ${zoomLvl}; 
                }
                table { page-break-inside: auto; }
                tr { page-break-inside: avoid; page-break-after: auto; }
                thead { display: table-header-group; }
            </style>
        </head>
        <body>
            ${content}
        </body>
        </html>
        `;

        const iframe = document.getElementById('hardwarePrintFrame');
        const doc = iframe.contentWindow.document;
        doc.open();
        doc.write(printHTML);
        doc.close();

        setTimeout(() => {
            iframe.contentWindow.focus();
            iframe.contentWindow.print();
        }, 500);
    }
</script>
</body>
</html>
