<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Planner Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* --- VIP THEME (DARK & GOLD) --- */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background: #121212; color: #fff; }
        .hidden { display: none !important; }
        
        /* LOGIN SCREEN */
        #login-screen { display: flex; height: 100vh; justify-content: center; align-items: center; background: radial-gradient(circle, #1a1a1a 0%, #000000 100%); }
        .login-box { background: #1e1e1e; padding: 40px; border-radius: 12px; border: 2px solid #d4af37; box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); text-align: center; width: 350px; }
        .login-box h2 { color: #d4af37; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; }
        .vip-input { width: 85%; padding: 12px; margin: 10px 0; background: #2a2a2a; border: 1px solid #d4af37; color: #fff; border-radius: 5px; font-size: 16px; outline: none; text-align: center; }
        .vip-btn { width: 100%; padding: 15px; margin-top: 20px; background: linear-gradient(45deg, #d4af37, #aa8014); border: none; color: #000; font-weight: 900; font-size: 18px; border-radius: 5px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .vip-btn:hover { box-shadow: 0 0 15px #d4af37; transform: scale(1.02); }

        /* APP SCREEN */
        #app-screen { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .header-panel { display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 20px; border-radius: 10px; border-bottom: 3px solid #d4af37; margin-bottom: 20px; }
        .upload-section { text-align: center; background: #1e1e1e; padding: 30px; border-radius: 10px; border: 1px dashed #d4af37; margin-bottom: 20px; }
        input[type="file"] { font-size: 18px; padding: 15px; cursor: pointer; background: #2a2a2a; color: #d4af37; border-radius: 5px; border: 1px solid #d4af37; }
        
        .day-nav { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        .day-btn { padding: 15px 30px; font-size: 18px; font-weight: 900; cursor: pointer; background: #d4af37; color: #000; border: none; border-radius: 5px; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .day-btn:hover { background: #aa8014; transform: translateY(-2px); }

        /* SCREEN TABLE VIEW */
        #render-area { width: 100%; background: #fff; border-radius: 8px; padding: 10px; margin-top: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; margin-bottom: 30px; color: #000; }
        th, td { border: 2px solid #000; padding: 8px; text-align: center; font-size: 16px; font-weight: 900; }
        th { background: #d4af37; text-transform: uppercase; }
        .route-title { background: #000; color: #d4af37; padding: 10px; font-size: 22px; font-weight: 900; text-align: left; border: 2px solid #000; margin-top: 20px; }

        /* --- OVERHAULED 1000% ACCURATE PRINT CSS --- */
        @media print {
            @page { 
                size: A4 landscape !important; 
                margin: 5mm !important; 
            }
            body, html { 
                width: 100% !important;
                background: white !important; 
                margin: 0 !important; 
                padding: 0 !important; 
            }
            /* Hide everything except the render area */
            #login-screen, .header-panel, .upload-section, .day-nav { display: none !important; }
            #app-screen { padding: 0 !important; margin: 0 !important; max-width: none !important; }
            #render-area { padding: 0 !important; margin: 0 !important; border: none !important; }
            
            table { 
                width: 100% !important; 
                border-collapse: collapse !important; /* CRITICAL: Forces grid borders to render */
                table-layout: auto !important; /* CRITICAL: Lets columns size naturally to avoid overlap */
                page-break-inside: auto; 
                margin-bottom: 20px !important;
            }
            tr { page-break-inside: avoid; page-break-after: auto; }
            thead { display: table-header-group; }
            
            th, td { 
                border: 1px solid #000 !important; /* FORCED BORDERS */
                padding: 4px !important; 
                font-size: 11px !important; /* Scaled for readability and fit */
                font-weight: 900 !important; 
                color: #000 !important;
                white-space: normal !important; /* Forces text to stack instead of overflow */
                word-wrap: break-word !important;
            }
            
            th { 
                background-color: #d9d9d9 !important; 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
            }
            
            .route-title { 
                page-break-before: always; 
                border: 1px solid #000 !important; 
                background-color: #000 !important; 
                color: #fff !important; 
                font-size: 16px !important; 
                padding: 6px !important;
                margin-top: 0 !important;
                margin-bottom: 5px !important;
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
            }
            .route-title:first-of-type { page-break-before: avoid; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Euro Store KPO Portal</h2>
            <input type="text" id="username" class="vip-input" placeholder="USERNAME" autocomplete="off">
            <input type="password" id="password" class="vip-input" placeholder="PASSWORD" autocomplete="off">
            <button class="vip-btn" onclick="attemptLogin()">ENTER SYSTEM</button>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <div class="header-panel">
            <h1 style="color: #d4af37; margin: 0;">GLOBAL PLANNER ENGINE</h1>
            <div>
                <span style="margin-right: 20px; font-weight: bold; font-size: 18px;">STATUS: <span style="color: #00ff00;">LIVE CONNECTED</span></span>
                <button onclick="logout('Manual Logout.')" style="padding: 10px 20px; background: #ff3333; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px;">LOGOUT</button>
            </div>
        </div>

        <div class="upload-section">
            <h2 style="color: #d4af37; margin-top: 0;">MASTER DATABASE OVERWRITE</h2>
            <p style="font-size: 16px; margin-bottom: 20px;">Uploading a new Excel file will instantly wipe the old schedule and replace it globally.</p>
            <input type="file" id="excel-file" accept=".xlsx, .xls">
        </div>

        <div id="day-nav" class="day-nav"></div>
        <div id="render-area"></div>
    </div>

<script>
    // ==========================================
    // 1. SUPABASE LIVE DATABASE CONNECTION
    // ==========================================
    const SUPABASE_URL = 'https://idctzgsrcthumrtyaucc.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkY3R6Z3NyY3RodW1ydHlhdWNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwODI5MjgsImV4cCI6MjA5NTY1ODkyOH0.QU2YHQx4QdbhEGex1AN4S_URt6OqrHXN4rnL7N3wbKI'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let masterData = [];
    let displayColumns = [];
    const columnsToRemove = ["Route Name", "Cycle route description", "Visit Day", "Customer Code", "MTD"];

    // ==========================================
    // 2. VIP SECURITY & 5-MIN TIMEOUT LOGIC
    // ==========================================
    const TIMEOUT_MS = 5 * 60 * 1000; // 5 Minutes

    function resetTimer() {
        if(localStorage.getItem('kpo_auth') === 'true') {
            localStorage.setItem('kpo_last_active', Date.now());
        }
    }

    window.onload = checkSession;
    document.onmousemove = resetTimer;
    document.onkeypress = resetTimer;
    document.onclick = resetTimer;

    setInterval(() => {
        if(localStorage.getItem('kpo_auth') === 'true') {
            const lastActive = parseInt(localStorage.getItem('kpo_last_active'));
            if(Date.now() - lastActive > TIMEOUT_MS) {
                logout("Session Expired due to 5 minutes of inactivity.");
            }
        }
    }, 10000);

    function attemptLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;

        if(u === 'KPO' && p === '15075') {
            localStorage.setItem('kpo_auth', 'true');
            localStorage.setItem('kpo_last_active', Date.now());
            
            Swal.fire({
                title: 'ACCESS GRANTED',
                text: 'VIP WELCOME DILAWAR ALI.',
                icon: 'success',
                background: '#1e1e1e',
                color: '#d4af37',
                confirmButtonColor: '#d4af37'
            }).then(() => {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                fetchLiveDatabase();
            });
        } else {
            Swal.fire({
                title: 'ACCESS DENIED',
                text: 'Invalid Credentials. Intrusion attempt logged.',
                icon: 'error',
                background: '#1e1e1e',
                color: '#ff0000',
                confirmButtonColor: '#ff0000'
            });
        }
    }

    function checkSession() {
        if(localStorage.getItem('kpo_auth') === 'true') {
            const lastActive = parseInt(localStorage.getItem('kpo_last_active'));
            if(Date.now() - lastActive < TIMEOUT_MS) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                fetchLiveDatabase();
            } else {
                logout("Session Expired.");
            }
        }
    }

    function logout(msg) {
        localStorage.removeItem('kpo_auth');
        localStorage.removeItem('kpo_last_active');
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('app-screen').classList.add('hidden');
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        document.getElementById('render-area').innerHTML = '';
        document.getElementById('day-nav').innerHTML = '';
        masterData = [];
        Swal.fire({ title: 'SYSTEM LOCKED', text: msg, icon: 'info', background: '#1e1e1e', color: '#fff', confirmButtonColor: '#d4af37' });
    }

    // ==========================================
    // 3. LIVE DATABASE SYNC (READ/WRITE)
    // ==========================================
    async function fetchLiveDatabase() {
        const { data, error } = await _supabase.from('day_planner').select('planner_data').eq('id', 1).single();
        if(data && data.planner_data) {
            masterData = data.planner_data;
            if(masterData.length > 0) {
                const allColumns = Object.keys(masterData[0]);
                displayColumns = allColumns.filter(col => !columnsToRemove.includes(col.trim()));
                buildUI();
            }
        }
    }

    document.getElementById('excel-file').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        Swal.fire({ 
            title: 'Uploading to Supabase...', 
            text: 'Overwriting Global Database',
            background: '#1e1e1e', 
            color: '#d4af37', 
            allowOutsideClick: false, 
            didOpen: () => { Swal.showLoading() } 
        });

        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames.includes('Sheet6') ? 'Sheet6' : workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(sheet, {defval: ""});
            
            const { error } = await _supabase.from('day_planner').upsert({ id: 1, planner_data: jsonData });
            
            if(!error) {
                masterData = jsonData;
                const allColumns = Object.keys(masterData[0]);
                displayColumns = allColumns.filter(col => !columnsToRemove.includes(col.trim()));
                buildUI();
                Swal.fire({ title: 'UPLOAD SUCCESS', text: 'Live Database Overwritten.', icon: 'success', background: '#1e1e1e', color: '#d4af37', confirmButtonColor: '#d4af37' });
            } else {
                Swal.fire({ title: 'UPLOAD FAILED', text: error.message, icon: 'error', background: '#1e1e1e', color: '#ff0000' });
            }
        };
        reader.readAsArrayBuffer(file);
    });

    // ==========================================
    // 4. PRINT ENGINE UI GENERATION
    // ==========================================
    function buildUI() {
        const days = [...new Set(masterData.map(item => item['Visit Day']))].filter(d => d).sort();
        const nav = document.getElementById('day-nav');
        nav.innerHTML = '';
        
        days.forEach(day => {
            const btn = document.createElement('button');
            btn.className = 'day-btn';
            btn.innerText = `🖨️ PRINT ${day}`;
            btn.onclick = () => renderPrintout(day);
            nav.appendChild(btn);
        });
    }

    function renderPrintout(targetDay) {
        const dayData = masterData.filter(row => row['Visit Day'] === targetDay);
        const routes = [...new Set(dayData.map(row => row['Route Code']))].sort();
        const renderArea = document.getElementById('render-area');
        renderArea.innerHTML = '';

        routes.forEach(route => {
            const routeData = dayData.filter(row => row['Route Code'] === route);
            
            const title = document.createElement('div');
            title.className = 'route-title';
            title.innerText = `DAY: ${targetDay} | ROUTE CODE: ${route}`;
            renderArea.appendChild(title);

            const table = document.createElement('table');
            const thead = document.createElement('thead');
            const trHead = document.createElement('tr');
            
            displayColumns.forEach(col => {
                const th = document.createElement('th');
                th.innerText = col.includes('__EMPTY') ? '' : col; 
                trHead.appendChild(th);
            });
            thead.appendChild(trHead);
            table.appendChild(thead);

            const tbody = document.createElement('tbody');
            routeData.forEach(row => {
                const tr = document.createElement('tr');
                displayColumns.forEach(col => {
                    const td = document.createElement('td');
                    td.innerText = row[col] !== undefined ? row[col] : "";
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            renderArea.appendChild(table);
        });

        setTimeout(() => window.print(), 800);
    }
</script>
</body>
</html>
