    <style>

        :root {

            --panel-bg: rgba(18, 20, 28, 0.7);
            --reckitt-pink: #E20074;
            --reckitt-purple: #7a00cc;

            --glass-blur: blur(25px);
            --text-main: #f8f9fa;
            --text-muted: #a0aab2;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; color: var(--text-main); overflow-x: hidden;

                        var(--bg-dark);
            background-attachment: fixed;
        }
        
        .hidden { display: none !important; }
        
        /* PREMIUM GLASS PANELS */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(255,255,255,0.05);
            border-top: 2px solid var(--reckitt-pink);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);

            font-style: italic;
            color: var(--reckitt-pink); 
            text-transform: uppercase;
            letter-spacing: -1.5px;
            margin-bottom: 5px;
            text-shadow: 0 4px 15px rgba(226, 0, 116, 0.4);
        }
        
        /* LOGIN SCREEN */
        #login-screen { display: flex; height: 100vh; justify-content: center; align-items: center; position: relative; z-index: 10; }
        .login-box { padding: 50px 40px; border-radius: 12px; text-align: center; width: 400px; }
        .login-box h4 { color: var(--text-muted); margin-top: 0; margin-bottom: 35px; letter-spacing: 4px; font-weight: 500; font-size: 14px; text-transform: uppercase; }
        
        .vip-input { width: 85%; padding: 16px; margin: 10px 0; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 6px; font-size: 16px; text-align: center; outline: none; transition: 0.3s; letter-spacing: 1px; }
        .vip-input:focus { border-color: var(--reckitt-pink); background: rgba(0,0,0,0.7); box-shadow: 0 0 15px rgba(226, 0, 116, 0.2); }
        .vip-btn { width: 100%; padding: 16px; margin-top: 25px; background: linear-gradient(135deg, var(--reckitt-pink), var(--reckitt-purple)); border: none; color: #fff; font-weight: 800; font-size: 16px; border-radius: 6px; cursor: pointer; transition: 0.3s; letter-spacing: 2px; text-transform: uppercase; }
        .vip-btn:hover { box-shadow: 0 8px 25px rgba(226, 0, 116, 0.4); transform: translateY(-2px); }

        /* VIP WELCOME ANIMATION SCREEN */
        #welcome-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-dark); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 1; transition: opacity 1s ease-out; }
        .glowing-name { font-size: 3.5rem; color: #fff; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 20px var(--reckitt-pink); animation: pulseGlow 1.5s infinite alternate; text-align: center; margin: 0; }
        .welcome-sub { color: var(--text-muted); font-size: 1.2rem; letter-spacing: 8px; margin-top: 20px; animation: slideUp 1s ease-out; text-transform: uppercase; }

        @keyframes pulseGlow { 0% { opacity: 0.8; transform: scale(0.98); } 100% { opacity: 1; transform: scale(1.02); } }
        @keyframes slideUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }

        /* APP SCREEN */
        #app-screen { padding: 30px; max-width: 1600px; margin: 0 auto; position: relative; z-index: 10; }
        .header-panel { display: flex; justify-content: space-between; align-items: center; padding: 25px 40px; border-radius: 12px; margin-bottom: 25px; }
        .upload-section { text-align: center; padding: 40px; border-radius: 12px; margin-bottom: 30px; }
        .upload-btn-secure { background: rgba(226, 0, 116, 0.1); border: 1px solid var(--reckitt-pink); color: #fff; padding: 15px 40px; font-size: 16px; font-weight: 800; border-radius: 6px; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .upload-btn-secure:hover { background: var(--reckitt-pink); box-shadow: 0 0 20px rgba(226, 0, 116, 0.4); }
        input[type="file"] { display: none; }
        
        .day-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; margin-top: 20px; }
        .day-card { border-radius: 12px; padding: 30px; text-align: center; transition: 0.3s; }
        .day-card:hover { border-color: var(--reckitt-pink); box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: translateY(-5px); }
        .day-card h3 { color: #fff; font-size: 22px; margin-top: 0; margin-bottom: 25px; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; }
        .action-btn { padding: 14px 10px; font-size: 14px; font-weight: 800; cursor: pointer; border: none; border-radius: 6px; transition: 0.2s; background: linear-gradient(90deg, var(--reckitt-pink), var(--reckitt-purple)); color: #fff; width: 100%; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .action-btn:hover { box-shadow: 0 5px 15px rgba(226, 0, 116, 0.4); filter: brightness(1.1); }

        /* THE MASTER PRINT DASHBOARD */
        #print-dashboard { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(5, 5, 8, 0.95); backdrop-filter: blur(15px); z-index: 9999; display: flex; flex-direction: column; }
        .dashboard-header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.6); }
        .dashboard-body { display: flex; flex: 1; overflow: hidden; }
        
        .settings-panel { width: 400px; padding: 30px; overflow-y: auto; border-right: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.4); }
        .setting-group { margin-bottom: 25px; }
        .setting-group label { display: block; font-weight: 700; margin-bottom: 10px; color: var(--text-muted); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .setting-group input[type="range"] { width: 100%; accent-color: var(--reckitt-pink); cursor: pointer; }
        .setting-group select { width: 100%; padding: 12px; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; font-weight: bold; outline: none; cursor: pointer; }
        .col-checkbox { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; font-size: 14px; cursor: pointer; color: #ddd; }
        
        .preview-panel { flex: 1; background: transparent; padding: 40px; overflow: auto; display: flex; justify-content: center; align-items: flex-start; }
        #live-preview-paper { background: #fff; color: #000; box-shadow: 0 20px 50px rgba(0,0,0,0.8); padding: 5mm; min-width: 297mm; min-height: 210mm; transform-origin: top center; }
        
        #hardwarePrintFrame { display: none; }

        /* CUSTOM SYNC PROGRESS BAR */
        .sync-container { width: 100%; background: #222; border-radius: 4px; overflow: hidden; border: 1px solid #444; margin-top: 15px; }
        .sync-bar { height: 8px; width: 0%; background: var(--reckitt-pink); transition: width 0.5s ease-out; box-shadow: 0 0 10px var(--reckitt-pink); }
    </style>
</head>
<body>

                <div class="setting-group" style="background: rgba(0,0,0,0.5); padding: 15px; border-radius: 6px; border-left: 3px solid var(--reckitt-pink);">

            <div class="preview-panel">

<script>
    // ==========================================
    // 1. SUPABASE DATABASE
    // ==========================================
    const SUPABASE_URL = 'https://idctzgsrcthumrtyaucc.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkY3R6Z3NyY3RodW1ydHlhdWNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwODI5MjgsImV4cCI6MjA5NTY1ODkyOH0.QU2YHQx4QdbhEGex1AN4S_URt6OqrHXN4rnL7N3wbKI'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let masterData = [];
    let allColumns = [];
    let sortedColumns = [];
    let activeDay = "";

    // STRICT ORDER: MAY FULL MONTH inserted immediately after Mini
    const STRICT_COLUMN_ORDER = [
        "Route Name", "Customer Code", "Mini", "MAY FULL MONTH", "MTD", "110g NCP OG", "110g NCP SC/Cool", 
        "80g NCP SC/OG/ Cool", "Harpic 225ml OG", "Harpic 450ml TC", "Veet Cream 18g/32g", 
        "Veet Lotion 40ml", "Mortein 300 ml", "LED Comp", "30N", "Coil"
    ];

    // ==========================================
    // 2. VIP SECURITY & HIGH CLASS CLOUD SYNC
    // ==========================================
    window.onload = () => { if(localStorage.getItem('kpo_auth') === 'true') { attemptLogin(true); } }

    function attemptLogin(auto = false) {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;

        if(auto || (u === 'KPO' && p === '15075')) {
            localStorage.setItem('kpo_auth', 'true');
            document.getElementById('login-screen').classList.add('hidden');
            
            if(!auto) {
                const welcome = document.getElementById('welcome-screen');
                welcome.classList.remove('hidden');
                setTimeout(() => {
                    welcome.style.opacity = '0';
                    setTimeout(() => {
                        welcome.classList.add('hidden');
                        document.getElementById('app-screen').classList.remove('hidden');
                        fetchLiveDatabase();
                    }, 1000); 
                }, 4000); 
            } else {
                document.getElementById('app-screen').classList.remove('hidden');
                fetchLiveDatabase();
            }
        } else {
            Swal.fire({ title: 'ACCESS DENIED', text: 'Unrecognized Credentials.', icon: 'error', background: 'rgba(18, 20, 28, 0.95)', color: '#E20074', confirmButtonColor: '#E20074' });
        }
    }

    function logout(msg) {
        localStorage.removeItem('kpo_auth');
        location.reload();
    }

    // 10-SECOND HIGH-CLASS SYNC ANIMATION
    async function fetchLiveDatabase() {
        let progress = 0;
        
        Swal.fire({
            title: 'ESTABLISHING SECURE LINK',
            html: `
                <div style="color: #a0aab2; font-size: 14px; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;" id="sync-status">Initializing Handshake...</div>
                <div class="sync-container">
                    <div id="sync-progress" class="sync-bar"></div>
                </div>
            `,
            background: 'rgba(18, 20, 28, 0.98)',
            color: '#fff',
            allowOutsideClick: false,
            showConfirmButton: false
        });

        const statusTexts = [
            "Decrypting Cloud Nodes...", 
            "Verifying Database Integrity...", 
            "Downloading Master Route Planner...", 
            "Compiling Virtual Data Grids...", 
            "Finalizing UI Injection..."
        ];
        
        let step = 0;
        const interval = setInterval(() => {
            progress += 10;
            const bar = document.getElementById('sync-progress');
            if(bar) bar.style.width = progress + '%';
            
            if(progress % 20 === 0 && step < statusTexts.length) {
                const statusText = document.getElementById('sync-status');
                if(statusText) statusText.innerText = statusTexts[step];
                step++;
            }
        }, 1000);

        try {
            const { data, error } = await _supabase.from('day_planner').select('planner_data').eq('id', 1).single();
            
            // Wait for 10 seconds to complete the cinematic progress bar
            setTimeout(() => {
                clearInterval(interval);
                if (error) {
                    Swal.fire({ title: 'SYNC FAILED', text: error.message, icon: 'error', background: 'rgba(18, 20, 28, 0.95)', color: '#E20074', confirmButtonColor: '#E20074' });
                } else if(data && data.planner_data && data.planner_data.length > 0) {
                    masterData = data.planner_data;
                    allColumns = Object.keys(masterData[0]);
                    sortAndPrepareColumns();
                    buildNavigation();
                    Swal.close();
                } else {
                    Swal.fire({ title: 'DATABASE EMPTY', text: 'No Planner found. Please upload.', icon: 'info', background: 'rgba(18, 20, 28, 0.95)', color: '#fff', confirmButtonColor: '#E20074' });
                }
            }, 10000);
        } catch (err) {
            clearInterval(interval);
            Swal.fire({ title: 'CRITICAL ERROR', text: err.message, icon: 'error', background: 'rgba(18, 20, 28, 0.95)', color: '#E20074', confirmButtonColor: '#E20074' });
        }
    }

    // ==========================================
    // 3. SECURE UPLOAD VERIFICATION
    // ==========================================
    function verifyAndUpload() {
        Swal.fire({
            title: 'SECURITY CLEARANCE',
            text: 'Enter Master Override Key',
            input: 'password',
            background: 'rgba(18, 20, 28, 0.98)',
            backdrop: 'rgba(0,0,0,0.8)',
            color: '#fff',
            confirmButtonColor: '#E20074',
            cancelButtonColor: '#333',
            showCancelButton: true
        }).then((result) => {
            if(result.value === 'Aa135135%') {
                document.getElementById('excel-file').click();
            } else if(result.value) {
                Swal.fire({title: 'ACCESS DENIED', text: 'Incorrect Security Key', icon: 'error', background: 'rgba(18, 20, 28, 0.95)', color: '#E20074', confirmButtonColor: '#E20074'});
            }
        });
    }

    document.getElementById('excel-file').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        Swal.fire({ title: 'Uploading to Network...', background: 'rgba(18, 20, 28, 0.95)', color: '#fff', didOpen: () => Swal.showLoading() });

        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames.includes('Sheet6') ? 'Sheet6' : workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(sheet, {defval: ""});
            
            const { error } = await _supabase.from('day_planner').upsert({ id: 1, planner_data: jsonData });
            if(!error) {
                masterData = jsonData;
                allColumns = Object.keys(masterData[0]);
                sortAndPrepareColumns();
                buildNavigation();
                Swal.fire({ title: 'UPLOAD SUCCESS', text: 'Database Overwritten.', icon: 'success', background: 'rgba(18, 20, 28, 0.95)', color: '#fff', confirmButtonColor: '#E20074' });
            }
        };
        reader.readAsArrayBuffer(file);
    });

    function sortAndPrepareColumns() {
        sortedColumns = [...allColumns].sort((a, b) => {
            let posA = STRICT_COLUMN_ORDER.indexOf(a.trim());
            let posB = STRICT_COLUMN_ORDER.indexOf(b.trim());
            if (posA === -1) posA = 999;
            if (posB === -1) posB = 999;
            return posA - posB;
        });
    }

    function buildNavigation() {
        const days = [...new Set(masterData.map(item => item['Visit Day']))].filter(d => d).sort();
        const nav = document.getElementById('day-nav');
        nav.innerHTML = '';
        
        days.forEach(day => {
            const card = document.createElement('div');
            card.className = 'day-card glass-panel';
            card.innerHTML = `
                <h3>${day} PROTOCOL</h3>
                <button class="action-btn" onclick="openPrintDashboard('${day}')">⚙️ CONFIGURE & PRINT</button>
                <button class="action-btn" style="background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #fff;" onclick="exportExcel('${day}')">📊 EXPORT TO EXCEL</button>
            `;
            nav.appendChild(card);
        });
    }

    function exportExcel(day) {
        const dayData = masterData.filter(row => row['Visit Day'] === day);
        const ws = XLSX.utils.json_to_sheet(dayData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, `Plan_${day}`);
        XLSX.writeFile(wb, `Master_Report_${day}.xlsx`);
    }

    // ==========================================
    // 4. THE AI AUTO-FIT DASHBOARD ENGINE (100X FIXED)
    // ==========================================
    function openPrintDashboard(day) {
        activeDay = day;
        document.getElementById('print-dashboard').classList.remove('hidden');
        
        const routeSelect = document.getElementById('route-filter');
        routeSelect.innerHTML = '<option value="ALL">ALL ROUTES (FULL BATCH)</option>';
        const dayData = masterData.filter(row => row['Visit Day'] === activeDay);
        const uniqueRoutes = [...new Set(dayData.map(row => row['Route Code']))].sort();
        uniqueRoutes.forEach(r => { if(r) routeSelect.innerHTML += `<option value="${r}">${r}</option>`; });

        const defaultHidden = ["Visit Day", "Cycle route description", "Route Code"];
        const colContainer = document.getElementById('column-toggles');
        colContainer.innerHTML = '';
        
        sortedColumns.forEach(col => {
            const isChecked = !defaultHidden.includes(col.trim());
            const labelName = col.includes('__EMPTY') ? '[Data Column / No Header]' : col;
            colContainer.innerHTML += `
                <label class="col-checkbox">
                    <input type="checkbox" class="col-toggle" value="${col}" ${isChecked ? 'checked' : ''} onchange="updatePreview()"> 
                    <span>${labelName}</span>
                </label>
            `;
        });
        
        document.getElementById('set-wrap').checked = false;
        updatePreview();
    }

    function closePrintDashboard() {
        document.getElementById('print-dashboard').classList.add('hidden');
    }

    function updatePreview() {
        const layoutMode = document.getElementById('set-layout').value;
        const zoomLevel = document.getElementById('set-zoom').value;
        const fSize = document.getElementById('set-font').value;
        const pad = document.getElementById('set-pad').value;
        const preventWrap = document.getElementById('set-wrap').checked;
        const selectedRouteFilter = document.getElementById('route-filter').value;
        
        document.getElementById('val-zoom').innerText = zoomLevel;
        document.getElementById('val-font').innerText = fSize;
        document.getElementById('val-pad').innerText = pad;

        const checkboxes = document.querySelectorAll('.col-toggle:checked');
        const selectedCols = Array.from(checkboxes).map(cb => cb.value);

        const dayData = masterData.filter(row => row['Visit Day'] === activeDay);
        let routes = [...new Set(dayData.map(row => row['Route Code']))].sort();
        if (selectedRouteFilter !== "ALL") routes = [selectedRouteFilter];
        
        let html = generateTableHTML(routes, dayData, selectedCols, fSize, pad, layoutMode, preventWrap);
        
        const paper = document.getElementById('live-preview-paper');
        paper.style.zoom = zoomLevel / 100;
        paper.innerHTML = html;
    }

    function generateTableHTML(routes, dayData, selectedCols, fSize, pad, layoutMode, preventWrap) {
        let html = '';
        
        // 100X LOCKDOWN: table-layout: fixed + width: 100% physically stops tables from escaping the page.
        const tableCSS = `width: 100%; max-width: 100%; border-collapse: collapse; margin-bottom: 25px; table-layout: ${layoutMode};`;
        
        // 100X LOCKDOWN: word-break: break-all forces long numbers to shatter and drop to the next line rather than pushing the cell wall outward.
        const wrapCSS = preventWrap ? 
            'white-space: nowrap; overflow: hidden; text-overflow: ellipsis;' : 
            'white-space: normal; word-wrap: break-word; word-break: break-all; overflow-wrap: break-word;';
        
        // 100X LOCKDOWN: max-width: 0 forces the cell to respect the <colgroup> width mathematically.
        const cellCSS = `
            border: 1.5pt solid #000; 
            padding: ${pad}px; 
            font-size: ${fSize}pt; 
            font-weight: 900 !important; 
            text-align: center; 
            font-family: Arial, sans-serif;
            max-width: 0;
            overflow: hidden;
            ${wrapCSS}
        `;

        let colGroupHTML = '<colgroup>';
        selectedCols.forEach(col => {
            let colLower = col.toLowerCase();
            let width = '4%'; // Slim product columns
            
            if(colLower === 'mini' || colLower === 'store name') {
                width = '12%'; 
            } else if(colLower.includes('customer') || colLower.includes('code')) {
                width = '8%'; 
            } else if(colLower.includes('route')) {
                width = '9%'; 
            } else if(colLower === 'mtd' || colLower.includes('month')) {
                width = '5%';
            }
            colGroupHTML += `<col style="width: ${width};">`;
        });
        colGroupHTML += '</colgroup>';

        routes.forEach(route => {
            const routeData = dayData.filter(row => row['Route Code'] === route);
            const routeName = routeData[0]['Route Name'] || '';
            const cycleDesc = routeData[0]['Cycle route description'] || '';
            
            html += `<div style="font-size: 15pt; font-weight: 900; font-family: Arial, sans-serif; margin-bottom: 5px; page-break-before: always; text-align: left; text-transform: uppercase;">ROUTE ${route} : ${routeName} : ${cycleDesc}</div>`;
            html += `<table style="${tableCSS}">`;
            
            if(layoutMode === 'fixed') html += colGroupHTML;
            
            html += `<thead><tr>`;
            selectedCols.forEach(col => {
                html += `<th style="${cellCSS} background-color: #E0E0E0 !important; text-transform: uppercase;">${col.includes('__EMPTY') ? '' : col}</th>`;
            });
            html += `</tr></thead><tbody>`;
            
            routeData.forEach(row => {
                html += `<tr>`;
                selectedCols.forEach(col => {
                    let val = row[col];
                    if(val !== undefined && val !== null && val !== "") {
                        if(!isNaN(val)) val = Math.round(Number(val));
                        
                        // Convert zeros to empty spaces for cleaner reading
                        if(val === 0 || val === "0") {
                            val = "";
                        }
                    } else {
                        val = "";
                    }
                    html += `<td style="${cellCSS}">${val}</td>`;
                });
                html += `</tr>`;
            });
            html += `</tbody></table>`;
        });
        
        html = html.replace('page-break-before: always;', 'page-break-before: avoid;');
        return html;
    }

    // ==========================================
    // 5. SECURE HARDWARE INJECTION
    // ==========================================
    function triggerHardwarePrint() {
        const content = document.getElementById('live-preview-paper').innerHTML;
        const zoomLvl = document.getElementById('set-zoom').value / 100;
        
        let printHTML = `
        <!DOCTYPE html>
        <html>
        <head>
            <style>
                @page { size: A4 landscape; margin: 5mm; }
                body { 
                    margin: 0; padding: 0; background: #fff; color: #000; 
                    -webkit-print-color-adjust: exact; print-color-adjust: exact; 
                    zoom: ${zoomLvl}; 
                }
                table { page-break-inside: auto; width: 100% !important; table-layout: fixed !important; }
                tr { page-break-inside: avoid; page-break-after: auto; }
                thead { display: table-header-group; }
                th, td { overflow: hidden !important; max-width: 0 !important; word-wrap: break-word !important; word-break: break-all !important; white-space: normal !important; }
            </style>
        </head>
        <body>
            ${content}
        </body>
        </html>
        `;

        const iframe = document.getElementById('hardwarePrintFrame');
        const doc = iframe.contentWindow.document;
        doc.open();
        doc.write(printHTML);
        doc.close();

        setTimeout(() => {
            iframe.contentWindow.focus();
            iframe.contentWindow.print();
        }, 500);
    }
</script>
</body>
</html>
