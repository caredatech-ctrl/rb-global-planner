<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Command Center - Master Auto-Fit Engine</title>
    <!-- VIP Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* --- GLOBAL VIP THEME --- */
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background: #0f1015; color: #fff; }
        .hidden { display: none !important; }
        
        /* LOGIN SCREEN */
        #login-screen { display: flex; height: 100vh; justify-content: center; align-items: center; background: radial-gradient(circle, #1a1c23 0%, #000000 100%); }
        .login-box { background: #171923; padding: 40px; border-radius: 12px; border: 1px solid #d4af37; box-shadow: 0 0 30px rgba(212, 175, 55, 0.15); text-align: center; width: 380px; }
        .login-box h2 { color: #d4af37; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 30px; font-weight: 900; }
        .vip-input { width: 85%; padding: 14px; margin: 10px 0; background: #222632; border: 1px solid #4a4a4a; color: #fff; border-radius: 5px; font-size: 16px; text-align: center; outline: none; }
        .vip-input:focus { border-color: #d4af37; box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
        .vip-btn { width: 100%; padding: 16px; margin-top: 25px; background: linear-gradient(135deg, #d4af37, #9c7c14); border: none; color: #000; font-weight: 900; font-size: 18px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .vip-btn:hover { box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); transform: scale(1.02); }

        /* APP SCREEN */
        #app-screen { padding: 30px; max-width: 1600px; margin: 0 auto; }
        .header-panel { display: flex; justify-content: space-between; align-items: center; background: #171923; padding: 25px; border-radius: 12px; border-bottom: 2px solid #d4af37; margin-bottom: 25px; }
        .upload-section { text-align: center; background: #171923; padding: 40px; border-radius: 12px; border: 1px dashed #d4af37; margin-bottom: 30px; }
        input[type="file"] { font-size: 18px; padding: 15px; cursor: pointer; background: #222632; color: #d4af37; border-radius: 5px; border: 1px solid #4a4a4a; }
        
        .day-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .day-card { background: #171923; border: 1px solid #333; border-radius: 10px; padding: 20px; text-align: center; }
        .day-card h3 { color: #d4af37; font-size: 24px; margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .action-btn { padding: 12px 10px; font-size: 16px; font-weight: 900; cursor: pointer; border: none; border-radius: 5px; transition: 0.2s; background: #d4af37; color: #000; width: 100%; margin-bottom: 10px; }
        .action-btn:hover { background: #c29b2b; transform: translateY(-2px); }

        /* --- THE MASTER PRINT DASHBOARD --- */
        #print-dashboard { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #0f1015; z-index: 9999; display: flex; flex-direction: column; }
        .dashboard-header { background: #171923; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #d4af37; }
        .dashboard-body { display: flex; flex: 1; overflow: hidden; }
        
        /* Left Panel: Settings */
        .settings-panel { width: 380px; background: #171923; padding: 20px; overflow-y: auto; border-right: 1px solid #333; }
        .setting-group { margin-bottom: 20px; }
        .setting-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #d4af37; }
        .setting-group input[type="range"] { width: 100%; }
        .setting-group select { width: 100%; padding: 10px; background: #222632; color: #fff; border: 1px solid #4a4a4a; border-radius: 4px; font-weight: bold; }
        .col-checkbox { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; font-size: 14px; cursor: pointer; }
        
        /* Right Panel: Live Preview */
        .preview-panel { flex: 1; background: #525659; padding: 30px; overflow: auto; display: flex; justify-content: center; align-items: flex-start; }
        #live-preview-paper { background: #fff; color: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); padding: 5mm; min-width: 297mm; min-height: 210mm; transform-origin: top center; }
        
        /* Hardware Print Engine Iframe */
        #hardwarePrintFrame { display: none; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Euro Store KPO Portal</h2>
            <input type="text" id="username" class="vip-input" placeholder="USERNAME" autocomplete="off">
            <input type="password" id="password" class="vip-input" placeholder="PASSWORD" autocomplete="off">
            <button class="vip-btn" onclick="attemptLogin()">ENTER SECURE SYSTEM</button>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="app-screen" class="hidden">
        <div class="header-panel">
            <h1 style="color: #d4af37; margin: 0; font-weight: 900;">GLOBAL COMMAND CENTER</h1>
            <div>
                <span style="font-weight: 900; font-size: 16px; margin-right: 15px;">DB: <span style="color: #00ff00;">ONLINE SYNCED</span></span>
                <button onclick="logout('Manual Security Lock.')" style="padding: 10px 25px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: 900;">LOCK CONSOLE</button>
            </div>
        </div>

        <div class="upload-section">
            <h2 style="color: #d4af37; margin-top: 0; font-size: 28px;">MASTER OVERWRITE PROTOCOL</h2>
            <input type="file" id="excel-file" accept=".xlsx, .xls">
        </div>
        <div id="day-nav" class="day-grid"></div>
    </div>

    <!-- MASTER PRINT DASHBOARD -->
    <div id="print-dashboard" class="hidden">
        <div class="dashboard-header">
            <h2 style="margin: 0; color: #d4af37;">🎛️ AI AUTO-FIT PRINT STABILIZER</h2>
            <div>
                <button onclick="closePrintDashboard()" style="padding: 10px 20px; background: #444; color: #fff; border: none; border-radius: 4px; margin-right: 10px; cursor: pointer; font-weight: bold;">CANCEL</button>
                <button onclick="triggerHardwarePrint()" style="padding: 10px 30px; background: #28a745; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px;">🖨️ PRINT SECURE REPORT</button>
            </div>
        </div>
        <div class="dashboard-body">
            <div class="settings-panel">
                <div class="setting-group">
                    <label>Grid Auto-Fit Mode</label>
                    <select id="set-layout" onchange="updatePreview()">
                        <option value="fixed">AI Strict Confinement (Never Overflows Page)</option>
                        <option value="auto">Natural Flow (Might Overflow if wide)</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>Print Preview Scale (<span id="val-zoom">100</span>%)</label>
                    <input type="range" id="set-zoom" min="50" max="150" value="100" step="5" oninput="updatePreview()">
                </div>
                <div class="setting-group">
                    <label>Data Font Size (<span id="val-font">7.5</span>pt)</label>
                    <input type="range" id="set-font" min="4" max="14" value="7.5" step="0.5" oninput="updatePreview()">
                </div>
                <div class="setting-group">
                    <label>Cell Padding (<span id="val-pad">2</span>px)</label>
                    <input type="range" id="set-pad" min="1" max="10" value="2" oninput="updatePreview()">
                </div>
                
                <h3 style="color: #d4af37; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 30px;">COLUMNS TO PRINT (Sorted via AI)</h3>
                <div id="column-toggles"></div>
            </div>
            
            <div class="preview-panel">
                <div id="live-preview-paper"></div>
            </div>
        </div>
    </div>

    <!-- INVISIBLE HARDWARE PRINT ENGINE -->
    <iframe id="hardwarePrintFrame"></iframe>

<script>
    // ==========================================
    // 1. SUPABASE DATABASE
    // ==========================================
    const SUPABASE_URL = 'https://idctzgsrcthumrtyaucc.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkY3R6Z3NyY3RodW1ydHlhdWNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwODI5MjgsImV4cCI6MjA5NTY1ODkyOH0.QU2YHQx4QdbhEGex1AN4S_URt6OqrHXN4rnL7N3wbKI'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let masterData = [];
    let allColumns = [];
    let sortedColumns = [];
    let activeDay = "";

    // EXACT STRICT ORDER: Forces names to the front, data to the back.
    const STRICT_COLUMN_ORDER = [
        "Route Name",
        "Customer Code",
        "Mini",
        "110g NCP OG",
        "110g NCP SC/Cool",
        "80g NCP SC/OG/ Cool",
        "Harpic 225ml OG",
        "Harpic 450ml TC",
        "Veet Cream 18g/32g",
        "Veet Lotion 40ml",
        "Mortein 300 ml",
        "LED Comp",
        "30N",
        "Coil"
    ];

    // ==========================================
    // 2. VIP SECURITY & LOGIC
    // ==========================================
    window.onload = () => { if(localStorage.getItem('kpo_auth') === 'true') { attemptLogin(true); } }

    function attemptLogin(auto = false) {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;

        if(auto || (u === 'KPO' && p === '15075')) {
            localStorage.setItem('kpo_auth', 'true');
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            fetchLiveDatabase();
            if(!auto) Swal.fire({ title: 'ACCESS GRANTED', text: 'VIP WELCOME DILAWAR ALI.', icon: 'success', background: '#171923', color: '#d4af37', confirmButtonColor: '#d4af37' });
        } else {
            Swal.fire({ title: 'ACCESS DENIED', text: 'Invalid Credentials.', icon: 'error', background: '#171923', color: '#ff4444' });
        }
    }

    function logout(msg) {
        localStorage.removeItem('kpo_auth');
        location.reload();
    }

    // ==========================================
    // 3. DATABASE SYNC & UI
    // ==========================================
    async function fetchLiveDatabase() {
        const { data } = await _supabase.from('day_planner').select('planner_data').eq('id', 1).single();
        if(data && data.planner_data) {
            masterData = data.planner_data;
            if(masterData.length > 0) {
                allColumns = Object.keys(masterData[0]);
                sortAndPrepareColumns();
                buildNavigation();
            }
        }
    }

    document.getElementById('excel-file').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        Swal.fire({ title: 'Overwriting Global DB...', background: '#171923', color: '#d4af37', didOpen: () => Swal.showLoading() });

        const reader = new FileReader();
        reader.onload = async (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const sheet = workbook.Sheets[workbook.SheetNames.includes('Sheet6') ? 'Sheet6' : workbook.SheetNames[0]];
            const jsonData = XLSX.utils.sheet_to_json(sheet, {defval: ""});
            
            const { error } = await _supabase.from('day_planner').upsert({ id: 1, planner_data: jsonData });
            if(!error) {
                masterData = jsonData;
                allColumns = Object.keys(masterData[0]);
                sortAndPrepareColumns();
                buildNavigation();
                Swal.fire({ title: 'DB UPDATED', icon: 'success', background: '#171923', color: '#d4af37' });
            }
        };
        reader.readAsArrayBuffer(file);
    });

    function sortAndPrepareColumns() {
        sortedColumns = [...allColumns].sort((a, b) => {
            let posA = STRICT_COLUMN_ORDER.indexOf(a.trim());
            let posB = STRICT_COLUMN_ORDER.indexOf(b.trim());
            if (posA === -1) posA = 999;
            if (posB === -1) posB = 999;
            return posA - posB;
        });
    }

    function buildNavigation() {
        const days = [...new Set(masterData.map(item => item['Visit Day']))].filter(d => d).sort();
        const nav = document.getElementById('day-nav');
        nav.innerHTML = '';
        
        days.forEach(day => {
            const card = document.createElement('div');
            card.className = 'day-card';
            card.innerHTML = `
                <h3>${day} OPERATIONS</h3>
                <button class="action-btn" onclick="openPrintDashboard('${day}')">⚙️ CONFIGURE & PRINT REPORT</button>
                <button class="action-btn" style="background:#28a745; color:#fff;" onclick="exportExcel('${day}')">📊 EXPORT MASTER EXCEL</button>
            `;
            nav.appendChild(card);
        });
    }

    function exportExcel(day) {
        const dayData = masterData.filter(row => row['Visit Day'] === day);
        const ws = XLSX.utils.json_to_sheet(dayData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, `Plan_${day}`);
        XLSX.writeFile(wb, `Master_Report_${day}.xlsx`);
    }

    // ==========================================
    // 4. THE AI AUTO-FIT DASHBOARD ENGINE
    // ==========================================
    function openPrintDashboard(day) {
        activeDay = day;
        document.getElementById('print-dashboard').classList.remove('hidden');
        
        // Default Hidden Columns: MTD and unneeded routes (BUT Customer Code and Route Name stay visible)
        const defaultHidden = ["Visit Day", "Cycle route description", "MTD", "Route Code"];
        
        const colContainer = document.getElementById('column-toggles');
        colContainer.innerHTML = '';
        
        sortedColumns.forEach(col => {
            const isChecked = !defaultHidden.includes(col.trim());
            const labelName = col.includes('__EMPTY') ? '[Data Column / No Header]' : col;
            colContainer.innerHTML += `
                <label class="col-checkbox">
                    <input type="checkbox" class="col-toggle" value="${col}" ${isChecked ? 'checked' : ''} onchange="updatePreview()"> 
                    ${labelName}
                </label>
            `;
        });
        
        updatePreview();
    }

    function closePrintDashboard() {
        document.getElementById('print-dashboard').classList.add('hidden');
    }

    function updatePreview() {
        const layoutMode = document.getElementById('set-layout').value;
        const zoomLevel = document.getElementById('set-zoom').value;
        const fSize = document.getElementById('set-font').value;
        const pad = document.getElementById('set-pad').value;
        
        document.getElementById('val-zoom').innerText = zoomLevel;
        document.getElementById('val-font').innerText = fSize;
        document.getElementById('val-pad').innerText = pad;

        const checkboxes = document.querySelectorAll('.col-toggle:checked');
        const selectedCols = Array.from(checkboxes).map(cb => cb.value);

        const dayData = masterData.filter(row => row['Visit Day'] === activeDay);
        const routes = [...new Set(dayData.map(row => row['Route Code']))].sort();
        
        let html = generateTableHTML(routes, dayData, selectedCols, fSize, pad, layoutMode);
        
        const paper = document.getElementById('live-preview-paper');
        paper.style.zoom = zoomLevel / 100;
        paper.innerHTML = html;
    }

    function generateTableHTML(routes, dayData, selectedCols, fSize, pad, layoutMode) {
        let html = '';
        
        // Core Table CSS
        const tableCSS = `
            width: 100%; 
            max-width: 100%; 
            border-collapse: collapse; 
            margin-bottom: 25px; 
            table-layout: ${layoutMode};
        `;
        const cellCSS = `
            border: 1.5pt solid #000; 
            padding: ${pad}px; 
            font-size: ${fSize}pt; 
            font-weight: bold; 
            text-align: center; 
            font-family: Arial, sans-serif;
            word-wrap: break-word; 
            word-break: break-word; 
            white-space: normal;
        `;

        // AI Column Resizer (Allocates intelligent widths to cells if using fixed layout)
        let colGroupHTML = '<colgroup>';
        selectedCols.forEach(col => {
            let colLower = col.toLowerCase();
            let width = '6%'; // Default shrink for numbers
            if(colLower.includes('customer') || colLower.includes('name')) {
                width = '14%'; // Max space for names
            } else if(colLower.includes('route')) {
                width = '10%'; // Mid space for routes
            }
            colGroupHTML += `<col style="width: ${width};">`;
        });
        colGroupHTML += '</colgroup>';

        routes.forEach(route => {
            const routeData = dayData.filter(row => row['Route Code'] === route);
            const routeName = routeData[0]['Route Name'] || '';
            const cycleDesc = routeData[0]['Cycle route description'] || '';
            
            html += `<div style="font-size: 16pt; font-weight: bold; font-family: Arial, sans-serif; margin-bottom: 5px; page-break-before: always; text-align: left;">ROUTE ${route} : ${routeName} : ${cycleDesc}</div>`;
            html += `<table style="${tableCSS}">`;
            
            // Only inject the sizing grid if Layout is Fixed
            if(layoutMode === 'fixed') html += colGroupHTML;
            
            html += `<thead><tr>`;
            
            selectedCols.forEach(col => {
                html += `<th style="${cellCSS} background-color: #E0E0E0 !important; text-transform: uppercase;">${col.includes('__EMPTY') ? '' : col}</th>`;
            });
            html += `</tr></thead><tbody>`;
            
            routeData.forEach(row => {
                html += `<tr>`;
                selectedCols.forEach(col => {
                    html += `<td style="${cellCSS}">${row[col] !== undefined ? row[col] : ""}</td>`;
                });
                html += `</tr>`;
            });
            html += `</tbody></table>`;
        });
        
        html = html.replace('page-break-before: always;', 'page-break-before: avoid;');
        return html;
    }

    // ==========================================
    // 5. SECURE HARDWARE INJECTION
    // ==========================================
    function triggerHardwarePrint() {
        const content = document.getElementById('live-preview-paper').innerHTML;
        const zoomLvl = document.getElementById('set-zoom').value / 100;
        
        let printHTML = `
        <!DOCTYPE html>
        <html>
        <head>
            <style>
                @page { size: A4 landscape; margin: 5mm; }
                body { 
                    margin: 0; padding: 0; background: #fff; color: #000; 
                    -webkit-print-color-adjust: exact; print-color-adjust: exact; 
                    zoom: ${zoomLvl}; 
                }
                table { page-break-inside: auto; }
                tr { page-break-inside: avoid; page-break-after: auto; }
                thead { display: table-header-group; }
            </style>
        </head>
        <body>
            ${content}
        </body>
        </html>
        `;

        const iframe = document.getElementById('hardwarePrintFrame');
        const doc = iframe.contentWindow.document;
        doc.open();
        doc.write(printHTML);
        doc.close();

        setTimeout(() => {
            iframe.contentWindow.focus();
            iframe.contentWindow.print();
        }, 500);
    }
</script>
</body>
</html>
